<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Hayé Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .button {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 10px 20px;
            background-color: #0077b5;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .vimeo-button {
            background-color: #1ab7ea;
        }
        .embed-button {
            background-color: #4CAF50;
        }
        #embedModal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
        }
        #embedContent {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 800px;
            height: 600px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: black;
        }
        .button-container {
            display: flex;
            justify-content: center;
            margin: 10px auto;
            width: fit-content;
        }
        .button-container .button {
            margin: 0; /* Remove margin for buttons inside the container */
            /* margin-left: 10; Remove margin for buttons inside the container */
            display: inline-block; /* Display buttons side-by-side */
        }
    </style>
</head>
<body>
    <h1>Victor Hayé</h1>

    <a href="https://www.linkedin.com/in/victor-haye/" class="button" target="_blank">
        LinkedIn
    </a>

    <div class="button-container">
        <a href="https://vimeo.com/339385030" class="button vimeo-button" target="_blank">
            3D Animation Reel
        </a>
        <button class="button embed-button" onclick="openEmbedModal()">
            Load Video
        </button>
    </div>

    <div id="embedModal">
        <div id="embedContent">
            <span class="close" onclick="closeEmbedModal()">&times;</span>
            <iframe
                src="https://player.vimeo.com/video/339385030"
                width="100%"
                height="100%"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        function openEmbedModal() {
            document.getElementById("embedModal").style.display = "block";
        }

        function closeEmbedModal() {
            document.getElementById("embedModal").style.display = "none";
        }
    </script>
</body>
</html>
